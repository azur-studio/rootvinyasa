<!DOCTYPE html>
<html lang="ko">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <meta name="format-detection" content="telephone=no">
  <meta name="robots" content="noindex, nofollow">
  <title>Root Admin · 루트 빈야사</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    :root {
      --bg:        #E9E6DF;
      --surface:   #F4F2EC;
      --card:      #FFFFFF;
      --text:      #26241F;
      --text-2:    #6B665E;
      --text-3:    #938D83;
      --text-4:    #A7A096;
      --text-5:    #C2BCB2;
      --line:      #F1EFE9;
      --line-2:    #E4E0D7;
      --green:     #3C5A45;
      --green-bg:  #E9F0EA;
      --red:       #B4452C;
      --red-bg:    #F6E5DF;
      --gold:      #9A6B16;
      --gold-bg:   #F6ECD7;
      --shadow-sm: 0 1px 2px rgba(38,36,31,.04), 0 4px 16px rgba(38,36,31,.04);
      --shadow-md: 0 1px 2px rgba(38,36,31,.06), 0 8px 24px rgba(38,36,31,.10);
      --r-sm: 11px;
      --r-md: 18px;
      --r-lg: 22px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -.01em;
    }
    input, textarea, select { font-family: inherit; font-size: 16px; }
    :focus { outline: none; }
    :focus-visible { outline: 2px solid var(--green); outline-offset: 2px; border-radius: 6px; }
    button { -webkit-tap-highlight-color: transparent; cursor: pointer; }
    a { -webkit-tap-highlight-color: transparent; }

    @keyframes fadeUp   { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    @keyframes sheetUp  { from { transform:translateY(100%); } to { transform:translateY(0); } }
    @keyframes overlayIn{ from { opacity:0; } to { opacity:1; } }
    @keyframes toastIn  { from { opacity:0; transform:translate(-50%,10px); } to { opacity:1; transform:translate(-50%,0); } }
    @keyframes skelPulse{ 0%,100%{opacity:1} 50%{opacity:.35} }
    @keyframes swipe    { 0%{transform:translateX(-100%)} 100%{transform:translateX(300%)} }
    @media (prefers-reduced-motion: reduce) {
      *,*::before,*::after { animation-duration:.01ms!important; transition-duration:.01ms!important; }
    }

    /* ── TOP LOADING BAR ── */
    .top-bar { position:fixed; top:0; left:0; width:100%; height:3px; background:rgba(60,90,69,.12); z-index:9999; display:none; overflow:hidden; }
    .top-bar::after { content:''; display:block; width:40%; height:100%; background:var(--green); border-radius:3px; animation:swipe 1.2s ease-in-out infinite; }

    /* ── DIALOG ── */
    .dlg-bg { position:fixed; inset:0; background:rgba(38,36,31,.42); opacity:0; visibility:hidden; transition:.25s; z-index:2000; }
    .dlg-bg.show { opacity:1; visibility:visible; }
    .dlg { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
           background:rgba(244,242,236,.96); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
           border-radius:18px; box-shadow:0 4px 24px rgba(38,36,31,.15); width:290px; z-index:2001;
           overflow:hidden; text-align:center; border:1px solid var(--line-2); }
    .dlg-msg { padding:26px 20px 18px; font-size:15px; line-height:1.5; color:var(--text); border-bottom:1px solid var(--line); word-break:keep-all; }
    .dlg-btns { display:flex; }
    .dlg-btn { flex:1; padding:15px 0; background:transparent; border:none; font-size:16px; font-weight:600; color:var(--green); transition:.15s; font-family:inherit; }
    .dlg-btn:active { background:var(--line); }
    .dlg-btn.cancel { border-right:1px solid var(--line); font-weight:400; color:var(--red); }

    /* ── LOGIN ── */
    #loginScreen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:0 40px 40px; animation:fadeUp .4s ease both; }
    .login-logo { width:56px; height:56px; border-radius:18px; background:var(--text); display:flex; align-items:center; justify-content:center; margin-bottom:22px; }
    .login-logo span { color:var(--surface); font-size:13px; font-weight:700; letter-spacing:.12em; }
    .login-title { font-size:20px; font-weight:700; letter-spacing:-.01em; }
    .login-sub { font-size:14px; color:var(--text-3); margin-top:5px; }
    .pin-input { width:100%; max-width:220px; padding:14px 18px; border:1.5px solid var(--line-2); border-radius:14px;
                 font-size:26px; font-weight:600; text-align:center; letter-spacing:.3em;
                 background:var(--card); color:var(--text); margin:28px 0 16px; outline:none;
                 transition:border-color .2s; font-family:inherit; }
    .pin-input:focus { border-color:var(--green); }
    .pin-submit { width:100%; max-width:220px; padding:14px; border-radius:14px; background:var(--text);
                  color:var(--surface); font-size:16px; font-weight:600; border:none; transition:opacity .15s; font-family:inherit; }
    .pin-submit:active { opacity:.85; }
    .pin-submit:disabled { opacity:.5; cursor:wait; }

    /* ── APP SHELL ── */
    #mainApp { display:none; }
    .app-header { padding:12px 22px 14px; background:var(--surface); position:sticky; top:0; z-index:10; }
    .app-header-title { font-size:26px; font-weight:700; letter-spacing:-.02em; line-height:1.1; }
    .app-header-sub { font-size:14px; color:var(--text-3); margin-top:3px; font-weight:500; }

    .container { max-width:600px; margin:0 auto; padding:16px 18px 110px; }

    .view-section { display:none; animation:fadeUp .3s ease both; }
    .view-section.active { display:block; }

    /* ── BOTTOM NAV ── */
    .bottom-nav { position:fixed; bottom:0; left:0; width:100%; display:none;
                  background:rgba(244,242,236,.92); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
                  border-top:1px solid var(--line-2); padding:10px 0;
                  padding-bottom:calc(10px + env(safe-area-inset-bottom,0px)); z-index:90; }
    .nav-inner { max-width:600px; margin:0 auto; display:flex; }
    .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
                color:var(--text-5); cursor:pointer; transition:color .2s; position:relative; padding:4px 0; }
    .nav-item.active { color:var(--green); }
    .nav-item svg { width:23px; height:23px; }
    .nav-label { font-size:11px; font-weight:600; }
    .badge-dot { position:absolute; top:2px; right:calc(50% - 16px); width:7px; height:7px; border-radius:50%; background:var(--red); display:none; }

    /* ── CARDS ── */
    .card { background:var(--card); border-radius:var(--r-lg); box-shadow:var(--shadow-sm); }
    .card-row { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid var(--line); }
    .card-row:last-child { border-bottom:none; }

    /* ── DASHBOARD HERO ── */
    .hero-card { background:var(--card); border-radius:var(--r-lg); padding:20px 18px; box-shadow:var(--shadow-sm); margin-bottom:24px; }
    .hero-eyebrow { font-size:12px; font-weight:600; letter-spacing:.14em; color:var(--text-4); text-align:center; }
    .hero-date-row { display:flex; align-items:center; justify-content:center; gap:10px; margin-top:8px; }
    .hero-nav-btn { width:32px; height:32px; border-radius:50%; background:var(--surface); border:none;
                    display:flex; align-items:center; justify-content:center; color:var(--text-3);
                    font-size:17px; flex-shrink:0; transition:background .15s; }
    .hero-nav-btn:active { background:var(--line-2); }
    .hero-date { font-size:30px; font-weight:700; letter-spacing:-.02em; line-height:1.05; white-space:nowrap; text-align:center; }
    .hero-meta { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:7px; }
    .hero-weekday { font-size:13px; color:var(--text-3); font-weight:500; }
    .hero-offset { font-size:11px; font-weight:600; color:var(--text-2); background:var(--surface); padding:2px 8px; border-radius:7px; }
    .hero-reset { font-size:12px; font-weight:600; color:var(--green); background:none; border:none; }
    .hero-reset:active { opacity:.6; }
    .hero-banner { margin-top:14px; padding:9px 14px; border-radius:11px; font-size:13px; font-weight:600; text-align:center; }

    /* ── SECTION HEADER ── */
    .section-hd { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:12px; padding:0 4px; }
    .section-hd-title { font-size:17px; font-weight:700; }
    .section-hd-count { font-size:13px; color:var(--text-3); font-weight:500; }

    /* ── ROSTER ITEM ── */
    .roster-card { background:var(--card); border-radius:var(--r-lg); overflow:hidden; box-shadow:var(--shadow-sm); }
    .roster-item { display:flex; align-items:center; gap:12px; padding:16px 18px; border-bottom:1px solid var(--line); transition:opacity .25s; }
    .roster-item:last-child { border-bottom:none; }
    .roster-item .r-main { flex:1; min-width:0; cursor:pointer; }
    .roster-item .r-name { display:flex; align-items:center; gap:7px; font-size:16px; font-weight:600; white-space:nowrap; overflow:hidden; }
    .roster-item .r-exp { font-size:13px; color:var(--text-4); margin-top:3px; }
    .chip { display:inline-flex; align-items:center; font-size:11px; font-weight:600; padding:2px 7px; border-radius:6px; white-space:nowrap; flex-shrink:0; }
    .chip-last   { background:var(--red-bg);   color:var(--red); }
    .chip-held   { background:var(--green-bg);  color:var(--green); }
    .chip-vip    { background:var(--text);       color:var(--surface); }
    .chip-oneday { background:var(--gold-bg);    color:var(--gold); }
    .chip-normal { background:var(--surface);    color:var(--text-2); }
    .empty-state { text-align:center; color:var(--text-4); font-size:14px; padding:44px 20px; }
    .roster-hint { font-size:12px; color:var(--text-5); margin:10px 6px 0; line-height:1.5; }

    /* ── TOGGLE SWITCH ── */
    .toggle-wrap { position:relative; width:46px; height:28px; border-radius:999px; flex-shrink:0; cursor:pointer; transition:background .25s; }
    .toggle-knob { position:absolute; top:3px; left:3px; width:22px; height:22px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(38,36,31,.25); transition:transform .25s; }
    .toggle-wrap input { opacity:0; width:0; height:0; position:absolute; }

    /* ── OPTIONAL SECTION ── */
    .optional-section { margin-bottom:24px; }
    .optional-section .section-hd-title { color:var(--green); }

    /* ── PENDING ── */
    .pending-card { background:var(--card); border-radius:var(--r-lg); padding:20px; margin-bottom:14px; box-shadow:var(--shadow-sm); }
    .pending-name { font-size:18px; font-weight:700; }
    .pending-phone { font-size:13px; color:var(--text-4); margin-left:6px; }
    .pending-option { font-size:15px; font-weight:600; margin-top:14px; }
    .pending-schedule { font-size:13px; color:var(--text-3); margin-top:2px; }
    .pending-amount { font-size:21px; font-weight:700; }
    .pending-memo { font-size:13px; color:var(--text-2); background:var(--surface); padding:9px 12px; border-radius:10px; margin-top:10px; }
    .pending-approve { margin-top:16px; text-align:center; padding:14px; border-radius:13px; background:var(--text); color:var(--surface); font-size:15px; font-weight:600; border:none; width:100%; transition:opacity .15s; }
    .pending-approve:active { opacity:.85; }
    .pending-approve:disabled { opacity:.5; cursor:wait; }

    /* ── MEMBERS ── */
    .search-wrap { display:flex; align-items:center; gap:9px; background:var(--card); border-radius:13px; padding:11px 15px; box-shadow:0 1px 2px rgba(38,36,31,.04); margin-bottom:14px; }
    .search-icon { color:var(--text-5); font-size:16px; }
    .search-input { border:none; outline:none; font-size:15px; flex:1; background:transparent; color:var(--text); }
    .seg-wrap { position:relative; display:flex; background:var(--line-2); border-radius:12px; padding:4px; margin-bottom:18px; }
    .seg-bg { position:absolute; top:4px; left:4px; width:calc(50% - 4px); height:calc(100% - 8px); background:var(--card); border-radius:9px; box-shadow:0 1px 3px rgba(38,36,31,.10); transition:transform .28s cubic-bezier(.25,.8,.25,1); }
    .seg-btn { flex:1; text-align:center; padding:8px 0; font-size:14px; font-weight:600; cursor:pointer; position:relative; z-index:1; color:var(--text-3); transition:color .28s; }
    .seg-btn.active { color:var(--text); }
    .member-item { display:flex; align-items:center; gap:12px; padding:16px 18px; border-bottom:1px solid var(--line); cursor:pointer; transition:background .15s; }
    .member-item:last-child { border-bottom:none; }
    .member-item:active { background:var(--surface); }
    .member-status { font-size:11px; font-weight:600; padding:2px 8px; border-radius:6px; white-space:nowrap; }
    .s-active   { background:var(--green-bg); color:var(--green); }
    .s-upcoming { background:#E3E8EF; color:#3A5673; }
    .s-expired  { background:var(--surface); color:var(--text-4); }
    .member-name { font-size:16px; font-weight:600; margin-top:3px; }
    .member-phone { font-size:13px; color:var(--text-4); margin-top:2px; }
    .member-chevron { color:var(--line-2); font-size:18px; flex-shrink:0; }
    .anomaly-banner { background:#FFF3E8; border:1px solid #E8C87A; border-radius:14px; padding:14px 16px; margin-bottom:16px; display:none; }
    .anomaly-title { font-size:13px; font-weight:700; color:var(--gold); }
    .anomaly-link { font-size:12px; color:var(--text-4); cursor:pointer; text-decoration:underline; background:none; border:none; font-family:inherit; }
    .anomaly-item { display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-top:1px solid rgba(154,107,22,.15); gap:8px; margin-top:4px; }
    .anomaly-item-text { font-size:12px; color:var(--gold); font-weight:500; flex:1; line-height:1.4; }
    .btn-anomaly-dismiss { background:transparent; border:1px solid rgba(154,107,22,.4); border-radius:6px; padding:3px 9px; font-size:11px; font-weight:600; color:var(--gold); white-space:nowrap; flex-shrink:0; }
    .btn-anomaly-dismiss:active { background:var(--gold-bg); }
    .btn-dismiss-all { background:transparent; border:none; font-size:11px; font-weight:600; color:var(--text-3); cursor:pointer; text-decoration:underline; font-family:inherit; }

    /* ── HOLIDAY ── */
    .holiday-add-card { background:var(--card); border-radius:var(--r-lg); padding:20px; box-shadow:var(--shadow-sm); margin-bottom:18px; }
    .holiday-add-title { font-size:16px; font-weight:700; margin-bottom:15px; }
    .holiday-input { width:100%; padding:12px 14px; border:1px solid var(--line-2); border-radius:12px; font-size:15px; outline:none; background:var(--surface); color:var(--text); margin-bottom:10px; font-family:inherit; }
    .holiday-type-row { display:flex; gap:8px; margin-bottom:14px; }
    .holiday-type-btn { flex:1; text-align:center; padding:11px 0; border-radius:11px; font-size:14px; font-weight:600; border:none; background:var(--surface); color:var(--text-3); transition:.15s; }
    .holiday-type-btn.active { background:var(--text); color:var(--surface); }
    .holiday-type-btn:active { opacity:.8; }
    .holiday-add-btn { width:100%; text-align:center; padding:13px; border-radius:13px; background:var(--text); color:var(--surface); font-size:15px; font-weight:600; border:none; transition:opacity .15s; }
    .holiday-add-btn:active { opacity:.85; }
    .section-label { font-size:13px; font-weight:600; color:var(--text-4); letter-spacing:.02em; margin:0 4px 10px; }
    .holiday-list-card { background:var(--card); border-radius:var(--r-lg); overflow:hidden; box-shadow:var(--shadow-sm); }
    .holiday-row { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid var(--line); }
    .holiday-row:last-child { border-bottom:none; }
    .holiday-date { font-size:15px; font-weight:600; }
    .holiday-type-tag { font-size:11px; font-weight:600; padding:2px 8px; border-radius:6px; }
    .ht-general  { background:var(--surface); color:var(--text-2); }
    .ht-optional { background:var(--gold-bg); color:var(--gold); }
    .holiday-reason { font-size:13px; color:var(--text-4); }
    .holiday-del { font-size:13px; font-weight:600; color:var(--red); background:none; border:none; padding:4px 8px; }
    .holiday-del:active { opacity:.6; }

    /* ── MEMBER DETAIL SHEET ── */
    .sheet-bg { position:fixed; inset:0; background:rgba(38,36,31,.42); z-index:50; opacity:0; visibility:hidden; transition:opacity .3s; }
    .sheet-bg.show { opacity:1; visibility:visible; animation:overlayIn .3s ease both; }
    .sheet { position:fixed; left:0; right:0; bottom:-100%; max-width:600px; margin:0 auto;
             max-height:88%; background:var(--surface); border-radius:28px 28px 0 0; z-index:51;
             display:flex; flex-direction:column; box-shadow:0 -12px 40px rgba(38,36,31,.18);
             transition:bottom .36s cubic-bezier(.2,.85,.25,1); }
    .sheet.show { bottom:0; animation:sheetUp .36s cubic-bezier(.2,.85,.25,1); }
    .sheet-handle { flex:none; padding:10px 0 4px; display:flex; justify-content:center; }
    .sheet-handle-bar { width:38px; height:5px; border-radius:3px; background:var(--line-2); }
    .sheet-header { flex:none; display:flex; align-items:center; justify-content:space-between; padding:8px 24px 14px; }
    .sheet-name { font-size:22px; font-weight:700; line-height:1.1; }
    .sheet-phone { font-size:13px; color:var(--text-3); margin-top:3px; }
    .sheet-close { width:32px; height:32px; border-radius:50%; background:var(--line-2); border:none; display:flex; align-items:center; justify-content:center; color:var(--text-2); font-size:15px; flex-shrink:0; }
    .sheet-close:active { background:var(--line); }
    .sheet-body { flex:1; overflow-y:auto; padding:4px 20px 36px; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }

    /* contact btns */
    .contact-row { display:flex; gap:10px; margin-bottom:20px; }
    .contact-btn { flex:1; text-align:center; padding:13px 0; background:var(--card); border-radius:13px; font-size:14px; font-weight:600; color:var(--text); text-decoration:none; box-shadow:0 1px 3px rgba(38,36,31,.05); }
    .contact-btn:active { background:var(--line); }

    /* pass card */
    .detail-section-label { font-size:13px; font-weight:600; color:var(--text-4); letter-spacing:.02em; margin:0 4px 10px; }
    .pass-card { background:var(--card); border-radius:var(--r-md); padding:16px 18px; margin-bottom:12px; box-shadow:0 1px 3px rgba(38,36,31,.05); }
    .pass-card-hd { display:flex; align-items:flex-start; justify-content:space-between; cursor:pointer; }
    .pass-card-hd:active { opacity:.8; }
    .pass-status { font-size:15px; font-weight:700; }
    .pass-period { font-size:13px; color:var(--text-3); margin-top:4px; }
    .pass-amount { font-size:15px; font-weight:700; }
    .pass-chevron { color:var(--text-5); font-size:13px; margin-left:8px; transition:transform .2s; }
    .pass-body { margin-top:14px; }
    .pass-tags { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:12px; }
    .pass-tag { font-size:12px; font-weight:600; padding:5px 10px; border-radius:8px; background:var(--surface); color:var(--text-2); }
    .pass-tag.green { background:var(--green-bg); color:var(--green); }

    /* date rows with 3-way segment */
    .date-list { border-top:1px solid var(--line); padding-top:10px; }
    .date-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; gap:10px; }
    .date-label { font-size:14px; font-weight:500; white-space:nowrap; }
    .date-label.dim { color:var(--text-4); }
    .date-label.past { color:var(--text-5); }
    .seg3 { display:flex; background:var(--surface); border-radius:10px; padding:2px; flex-shrink:0; }
    .seg3-btn { padding:5px 10px; border-radius:8px; font-size:11.5px; font-weight:600; border:none; background:transparent; color:var(--text-4); transition:all .15s; cursor:pointer; }
    .seg3-btn.active-attend { background:var(--card); color:var(--text); box-shadow:0 1px 2px rgba(38,36,31,.12); }
    .seg3-btn.active-pause  { background:var(--red-bg); color:var(--red); }
    .seg3-btn.active-hold   { background:var(--green-bg); color:var(--green); }
    .dup-badge      { background:var(--red-bg); color:var(--red); font-size:10px; font-weight:700; padding:1px 5px; border-radius:4px; }
    .conflict-badge { background:var(--gold-bg); color:var(--gold); font-size:10px; font-weight:700; padding:1px 5px; border-radius:4px; }
    .past-section { border-top:1px dashed var(--line); padding-top:10px; margin-top:4px; }
    .past-toggle-btn { background:var(--surface); border:none; width:100%; text-align:left; padding:8px 10px; border-radius:8px; font-size:12px; font-weight:600; color:var(--text-3); margin-bottom:6px; font-family:inherit; }
    .past-toggle-btn:active { background:var(--line); }

    /* renewal toggle */
    .renewal-row { display:flex; justify-content:space-between; align-items:center; padding:11px 0; border-top:1px solid var(--line); margin-top:6px; }
    .renewal-label { font-size:14px; font-weight:600; color:var(--text-3); }
    .renewal-row.active .renewal-label { color:var(--green); }
    /* reuse toggle-wrap for renewal switch */

    /* memo */
    .memo-textarea { width:100%; height:88px; padding:14px; border:none; border-radius:14px; background:var(--card); font-size:15px; outline:none; resize:none; line-height:1.5; color:var(--text); box-shadow:0 1px 3px rgba(38,36,31,.05); }
    .save-btn { margin-top:10px; text-align:center; padding:14px; border-radius:13px; background:var(--text); color:var(--surface); font-size:15px; font-weight:600; border:none; width:100%; transition:opacity .15s; }
    .save-btn:active { opacity:.85; }
    .save-btn:disabled { opacity:.5; cursor:wait; }

    /* manual edit */
    .edit-toggle-row { margin-top:18px; display:flex; align-items:center; justify-content:center; gap:6px; font-size:13px; font-weight:600; color:var(--text-4); cursor:pointer; padding:8px; background:none; border:none; width:100%; font-family:inherit; }
    .edit-toggle-row:active { opacity:.7; }
    .emergency-panel { background:#FBF3E0; border:1px solid #ECD9A8; border-radius:16px; padding:16px; margin-top:4px; display:none; }
    .emergency-desc { font-size:12px; font-weight:600; color:var(--gold); line-height:1.5; margin-bottom:14px; }
    .em-field { margin-bottom:12px; }
    .em-label { font-size:12px; font-weight:700; color:var(--gold); margin-bottom:5px; display:block; }
    .em-input { width:100%; font-size:14px; padding:10px 12px; border:1px solid #ECD9A8; border-radius:10px; background:#FFFDF7; outline:none; font-family:inherit; color:var(--text); }
    .em-save-btn { width:100%; background:var(--gold); color:#fff; border:none; padding:12px; font-size:14px; font-weight:600; border-radius:10px; margin-top:4px; font-family:inherit; }
    .em-save-btn:active { opacity:.85; }

    /* sat picker */
    .sat-picker { border:1px solid #ECD9A8; border-radius:8px; background:#FFFDF5; padding:8px 10px; }
    .sat-picker.green { border-color:#A5D6A7; }
    .sat-chips { display:flex; flex-wrap:wrap; gap:5px; min-height:26px; margin-bottom:8px; }
    .sat-chip { display:inline-flex; align-items:center; gap:4px; background:#FFF3CD; border:1px solid #ECD9A8; border-radius:6px; padding:3px 8px; font-size:12px; font-weight:600; color:var(--gold); }
    .sat-chip-del { cursor:pointer; color:var(--gold); font-size:15px; line-height:1; margin-left:2px; }
    .sat-cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .sat-cal-nav button { background:var(--surface); border:none; padding:4px 10px; border-radius:6px; font-size:12px; cursor:pointer; font-weight:600; }
    .sat-cal-nav span { font-size:13px; font-weight:700; }
    .sat-cal-grid { display:flex; flex-wrap:wrap; gap:5px; }
    .sat-btn { padding:6px 10px; border-radius:6px; border:1px solid #ECD9A8; background:#FFF; font-size:12px; font-weight:600; color:var(--gold); cursor:pointer; transition:.15s; }
    .sat-btn.selected { background:var(--gold); color:#FFF; border-color:var(--gold); }

    /* toast */
    .toast { position:fixed; bottom:96px; left:50%; transform:translateX(-50%);
             background:rgba(38,36,31,.94); color:var(--surface); padding:12px 22px;
             border-radius:14px; font-size:14px; font-weight:500; z-index:200;
             animation:toastIn .25s ease both; white-space:nowrap;
             box-shadow:0 8px 24px rgba(38,36,31,.25); display:none; }
  </style>
</head>
<body>

      <div class="emergency-desc">전산 오류 교정용입니다. 구분·금액·수업 날짜를 직접 고칠 수 있어요.</div>

<script>
  let adminData    = {};
  let membersData  = [];
  let pendingData  = [];
  let _activeAnomalies = [];
  let holidayData  = { all: [], reasons: {}, types: {} };
  let currentSegment  = 'active';
  let cache           = { dashboard:false, pending:false, members:false, holiday:false };
  let isSyncing       = false;
  let confirmCallback = null;
  let emergencyMode   = false;
  let selectedHolidayType = '일반';
  let weekOffset      = 0;
  let satPickerState  = {};
  let toastTimer      = null;

  // ─── UTILS ───────────────────────────────
  function showTopLoading() { document.getElementById('topLoadingBar').style.display = 'block'; }
  function hideTopLoading()  { document.getElementById('topLoadingBar').style.display = 'none'; }

  function showToast(msg) {
    const el = document.getElementById('toastEl');
    el.textContent = msg; el.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.style.display = 'none'; }, 1900);
  }

  function escapeHtml(str) {
    return String(str==null?'':str).replace(/[&<>"']/g, function(m){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m];
    });
  }
  function escapeJsAttr(str) {
    return escapeHtml(String(str==null?'':str).replace(/\\/g,'\\\\'));
  }
  function safeFormatDate(dStr) {
    if (!dStr) return '';
    let s = String(dStr);
    if (s.indexOf('GMT') !== -1 || s.indexOf('Time') !== -1) {
      let d = new Date(s);
      if (!isNaN(d.getTime())) return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
    }
    return s.split('-').join('/');
  }
  function safeShortDate(dStr) {
    let full = safeFormatDate(dStr), parts = full.split('/');
    return parts.length >= 3 ? parts[1]+'/'+parts[2] : full;
  }
  function bigDate(dStr) {
    let p = safeFormatDate(dStr).split('/');
    return p.length === 3 ? p[0]+'. '+p[1]+'. '+p[2] : dStr;
  }
  function weekdayStr(dStr) {
    let d = new Date(String(dStr).replace(/\//g,'-')+'T00:00:00');
    return ['일','월','화','수','목','금','토'][d.getDay()]+'요일';
  }
  function formatPhone(p) {
    if (!p) return '';
    let n = String(p).replace(/[^0-9]/g,'');
    if (n.length === 11) return n.replace(/(\d{3})(\d{4})(\d{4})/,'$1-$2-$3');
    if (n.length === 10) return n.replace(/(\d{3})(\d{3})(\d{4})/,'$1-$2-$3');
    return String(p);
  }
  function renderSafeDialogMsg(msg) {
    let raw = String(msg==null?'':msg);
    let tok = raw.replace(/<br\s*\/?>/gi,'BR');
    return escapeHtml(tok).replace(/BR/g,'<br>').replace(/\n/g,'<br>');
  }
  function showCustomAlert(msg) {
    document.getElementById('customAlertMsg').innerHTML = renderSafeDialogMsg(msg);
    document.getElementById('dialogBackdrop').classList.add('show');
    document.getElementById('customAlert').style.display = 'block';
  }
  function closeCustomAlert() {
    document.getElementById('customAlert').style.display = 'none';
    document.getElementById('dialogBackdrop').classList.remove('show');
  }
  function showCustomConfirm(msg, callback) {
    document.getElementById('customConfirmMsg').innerHTML = renderSafeDialogMsg(msg);
    document.getElementById('dialogBackdrop').classList.add('show');
    document.getElementById('customConfirm').style.display = 'block';
    confirmCallback = callback;
  }
  function handleConfirm(agreed) {
    document.getElementById('customConfirm').style.display = 'none';
    document.getElementById('dialogBackdrop').classList.remove('show');
    if (confirmCallback) confirmCallback(agreed);
  }

  // ─── AUTH ─────────────────────────────────
  let sessionAuth = false;
  const AUTH_TOKEN_KEY = 'rootAuthToken_v1';
  function getStoredToken() { try { return localStorage.getItem(AUTH_TOKEN_KEY)||''; } catch(e){ return ''; } }
  function clearStoredToken() { try { localStorage.removeItem(AUTH_TOKEN_KEY); localStorage.removeItem('rootAuth'); } catch(e){} sessionAuth=false; }
  function persistToken(tok) { try { localStorage.setItem(AUTH_TOKEN_KEY,tok); } catch(e){} }

  // ─── PIN INPUT ────────────────────────────
  function submitPinFromInput() {
    const input = document.getElementById('pinInput');
    const btn   = document.getElementById('pinSubmitBtn');
    const pin   = input.value.trim();
    if (!pin) { input.focus(); return; }
    input.disabled = true; btn.disabled = true;
    google.script.run
      .withSuccessHandler(function(result) {
        input.disabled = false; btn.disabled = false; input.value = '';
        if (result && result.token) {
          persistToken(result.token);
          sessionAuth = true;
          initApp();
        } else {
          showCustomAlert('PIN 번호가 일치하지 않습니다.');
          input.focus();
        }
      })
      .withFailureHandler(function() {
        input.disabled = false; btn.disabled = false; input.value = '';
        showCustomAlert('서버 통신 오류가 발생했습니다.<br>배포 버전을 확인해 주세요.');
        input.focus();
      })
      .verifyAdminPin(pin);
  }

  window.onload = function() {
    const tok = getStoredToken();
    if (!tok) return;
    google.script.run
      .withSuccessHandler(function(ok) {
        if (ok) { sessionAuth=true; initApp(); }
        else { clearStoredToken(); }
      })
      .withFailureHandler(function(){})
      .verifyAdminToken(tok);
  };

  function initApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display     = 'block';
    document.getElementById('bottomNav').style.display   = 'block';
    executeTabSwitch('dashboard');
    // 로그인 직후 모든 탭 데이터 미리 로드 (탭 전환 즉시 렌더 위해)
    setTimeout(_prefetchAllTabs, 1800);
  }

  function _prefetchAllTabs() {
    if(!cache.members) {
      google.script.run
        .withSuccessHandler(function(data){ membersData=data; cache.members=true; })
        .getAdminMembersList();
    }
    if(!cache.holiday) {
      google.script.run
        .withSuccessHandler(function(data){ holidayData=data; cache.holiday=true; })
        .getInitialData();
    }
    // pending은 checkPendingBadgeSilently가 이미 처리
  }

  // ─── TAB SWITCH ───────────────────────────
  function switchTab(tab) { executeTabSwitch(tab); }
  function executeTabSwitch(tab) {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
    const tabMap = { dashboard:0, pending:1, members:2, holiday:3 };
    const navItems = document.querySelectorAll('.nav-item');
    if (navItems[tabMap[tab]]) navItems[tabMap[tab]].classList.add('active');

    const titles = { dashboard:'클래스 현황', pending:'결제 대기열', members:'회원 관리', holiday:'휴강 관리' };
    document.getElementById('headerTitle').innerText = titles[tab] || '';

    if (tab === 'dashboard') {
      document.getElementById('view-dashboard').classList.add('active');
      loadDashboard();
    } else if (tab === 'pending') {
      document.getElementById('view-pending').classList.add('active');
      loadPending();
    } else if (tab === 'members') {
      document.getElementById('view-members').classList.add('active');
      loadMembers();
    } else if (tab === 'holiday') {
      document.getElementById('view-holiday').classList.add('active');
      loadHolidayList();
    }
  }

  // ─── DASHBOARD ────────────────────────────
  function checkPendingBadgeSilently() {
    google.script.run.withSuccessHandler(function(data) {
      pendingData = data; cache.pending = true;
      document.getElementById('pendingBadge').style.display = data.length > 0 ? 'block' : 'none';
      if (document.getElementById('view-pending').classList.contains('active')) renderPending();
    }).getPendingPayments();
  }

  function loadDashboard() {
    if (cache.dashboard) {
      renderDashboard();
      // 캐시 있을 때: 로딩바 없이 백그라운드 갱신
      if(!isSyncing) {
        isSyncing = true;
        google.script.run
          .withSuccessHandler(function(data){
            adminData=data; cache.dashboard=true; isSyncing=false;
            renderDashboard(); checkPendingBadgeSilently();
          })
          .withFailureHandler(function(){ isSyncing=false; })
          .getAdminDashboardData(weekOffset);
      }
      return;
    }
    if (isSyncing) return;
    isSyncing = true; showTopLoading();
    google.script.run
      .withSuccessHandler(function(data) {
        adminData = data; cache.dashboard = true; isSyncing = false; hideTopLoading();
        renderDashboard();
        checkPendingBadgeSilently();
      })
      .withFailureHandler(function() { isSyncing = false; hideTopLoading(); })
      .getAdminDashboardData(weekOffset);
  }

  function navigateWeek(dir) {
    weekOffset += dir;
    cache.dashboard = false;
    updateWeekOffsetUI();
    loadDashboard();
  }
  function resetWeek() {
    weekOffset = 0;
    cache.dashboard = false;
    updateWeekOffsetUI();
    loadDashboard();
  }
  function updateWeekOffsetUI() {
    const lbl = document.getElementById('weekOffsetLabel');
    const rst = document.getElementById('weekResetBtn');
    if (weekOffset === 0) { lbl.style.display='none'; rst.style.display='none'; }
    else {
      lbl.innerText = weekOffset > 0 ? '+'+weekOffset+'주 후' : Math.abs(weekOffset)+'주 전';

  function togglePauseOptimistic(key, currentlyPaused, toggleElem) {
    const isAdding = !currentlyPaused;
    const itemDiv  = document.getElementById('item_'+key);
    if (!itemDiv) return;
    const attBox = document.getElementById('attendeeList');
    const pBox   = document.getElementById('pausedList');
    const attCnt = document.getElementById('attCount');
    const pauCnt = document.getElementById('pauseCount');

    // snapshot for rollback
    const snapOpacity  = itemDiv.style.opacity;
    const snapDeco     = itemDiv.querySelector('.r-name')?.style.textDecoration || '';
    const snapColor    = itemDiv.querySelector('.r-name')?.style.color || '';
    const snapBg       = toggleElem.style.background;
    const snapKnob     = toggleElem.querySelector('.toggle-knob').style.transform;
    const snapParent   = isAdding ? attBox : pBox;

    if (isAdding) {
      itemDiv.style.opacity = '.55';
      const rn = itemDiv.querySelector('.r-name'); if(rn){rn.style.textDecoration='line-through';rn.style.color='var(--text-4)';}
      toggleElem.style.background = 'var(--green)';
      toggleElem.querySelector('.toggle-knob').style.transform = 'translateX(18px)';
      // clear empty state before moving
      pBox.querySelector('.empty-state')?.remove();
      pBox.appendChild(itemDiv);
      const a = parseInt(attCnt.innerText); attCnt.innerText = Math.max(0,a-1) + ' 명';
      pauCnt.innerText = (parseInt(pauCnt.innerText) + 1) + ' 명';
    } else {
      itemDiv.style.opacity = '1';
      const rn = itemDiv.querySelector('.r-name'); if(rn){rn.style.textDecoration='';rn.style.color='';}
      toggleElem.style.background = '#E2DFD8';
      toggleElem.querySelector('.toggle-knob').style.transform = 'translateX(0)';
      attBox.querySelector('.empty-state')?.remove();
      attBox.appendChild(itemDiv);
      const p = parseInt(pauCnt.innerText); pauCnt.innerText = Math.max(0,p-1) + ' 명';
      attCnt.innerText = (parseInt(attCnt.innerText) + 1) + ' 명';
    }
    toggleElem.setAttribute('onclick', `togglePauseOptimistic('${key}',${isAdding},this)`);

    function rollback() {
      itemDiv.style.opacity = snapOpacity;
      const rn = itemDiv.querySelector('.r-name'); if(rn){rn.style.textDecoration=snapDeco;rn.style.color=snapColor;}
      toggleElem.style.background = snapBg;
      toggleElem.querySelector('.toggle-knob').style.transform = snapKnob;
      toggleElem.setAttribute('onclick', `togglePauseOptimistic('${key}',${currentlyPaused},this)`);
      snapParent.appendChild(itemDiv);
      // restore counts
      if(isAdding){
        const a=parseInt(attCnt.innerText); attCnt.innerText=(a+1)+' 명';
        const p=parseInt(pauCnt.innerText); pauCnt.innerText=Math.max(0,p-1)+' 명';
      } else {
        const p=parseInt(pauCnt.innerText); pauCnt.innerText=(p+1)+' 명';
        const a=parseInt(attCnt.innerText); attCnt.innerText=Math.max(0,a-1)+' 명';
      }
    }

    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success) { rollback(); showCustomAlert('처리 중 오류가 발생했습니다.'); return; }
        cache.members=false; cache.dashboard=false;
        if (res.hasConflict && res.conflictDates && res.conflictDates.length>0) {
          showCustomAlert('⚠️ 날짜 충돌 감지\n\n밀려난 날짜가 다른 수강권과 겹칩니다:\n'+res.conflictDates.join(', ')+'\n\n회원 상세에서 확인해 주세요.');
        }
      })
      .withFailureHandler(function() { rollback(); showCustomAlert('서버 오류가 발생했습니다.'); })
      .togglePauseAdmin(key, adminData.nextSaturday, isAdding);
  }

  function renderMembers() {

      return currentSegment==='active' ? s!=='만료' : s==='만료';
    });
    if (filtered.length === 0) { mBox.innerHTML='<div class="empty-state">해당하는 회원이 없습니다.</div>'; return; }
    filtered.forEach(m => {
      const ms = getMainStatus(m);
      const sc = ms==='수강중'?'s-active':(ms==='수강예정'?'s-upcoming':'s-expired');
      const anomHtml = m._hasAnomaly ? '<span class="dup-badge">⚠️ 확인 필요</span>' : '';
      var nameAttr = escapeJsAttr(m.name), phoneAttr = escapeJsAttr(m.phone);

  function getMainStatus(m) {
    if (m.passes.some(p=>p.status==='수강중')) return '수강중';
    if (m.passes.some(p=>p.status==='수강예정')) return '수강예정';
    return '만료';
  }

  function checkAnomalies() {
    let all = [];
    const rx = /^\d{4}-\d{2}-\d{2}$/;
    membersData.forEach(function(m) {
      m.passes.forEach(function(p) {
        p.upcomingDates.forEach(function(d) {
          if (d && !rx.test(d.trim())) all.push({ key:m.name+'::날짜형식::'+d, label:'['+m.name+'] 날짜 형식 오류: "'+d+'"', memberName:m.name });
        });
        if (p.pauseHistory.length > p.maxPauses) all.push({ key:m.name+'::쉬어가기초과', label:'['+m.name+'] 쉬어가기 초과 ('+p.pauseHistory.length+'/'+p.maxPauses+')', memberName:m.name });
        let seen={};
        p.upcomingDates.forEach(function(d){ if(seen[d]) all.push({key:m.name+'::중복::'+d,label:'['+m.name+'] 중복 날짜: '+d,memberName:m.name}); seen[d]=true; });
      });
    });
    let dismissed = _getDismissedAnomalies();
    _activeAnomalies = all.filter(a => dismissed.indexOf(a.key)===-1);
    membersData.forEach(m => { m._hasAnomaly = _activeAnomalies.some(a=>a.memberName===m.name); });
    _renderAnomalyBanner();
  }
  function _getDismissedAnomalies() { try{return JSON.parse(localStorage.getItem('admin_dismissed_anomalies')||'[]');}catch(e){return[];} }
  function dismissAnomaly(key) {
    let d=_getDismissedAnomalies(); if(d.indexOf(key)===-1)d.push(key);
    localStorage.setItem('admin_dismissed_anomalies',JSON.stringify(d));
    _activeAnomalies=_activeAnomalies.filter(a=>a.key!==key);
    membersData.forEach(m=>{m._hasAnomaly=_activeAnomalies.some(a=>a.memberName===m.name);}); _renderAnomalyBanner(); renderMembers();
  }
  function dismissAllAnomalies() {
    let d=_getDismissedAnomalies(); _activeAnomalies.forEach(a=>{if(d.indexOf(a.key)===-1)d.push(a.key);}); localStorage.setItem('admin_dismissed_anomalies',JSON.stringify(d));
    _activeAnomalies=[]; membersData.forEach(m=>{m._hasAnomaly=false;}); _renderAnomalyBanner(); renderMembers();
  }
  function _renderAnomalyBanner() {
    const b=document.getElementById('anomalyBanner'),d=document.getElementById('anomalyDetail');
    if(_activeAnomalies.length===0){b.style.display='none';return;}
    b.style.display='block';
    d.innerHTML=_activeAnomalies.map(a=>`<div class="anomaly-item"><span class="anomaly-item-text">${escapeHtml(a.label)}</span><button class="btn-anomaly-dismiss" onclick="dismissAnomaly('${escapeJsAttr(a.key)}')">확인</button></div>`).join('')
      +'<div style="text-align:right;margin-top:8px;"><button class="btn-dismiss-all" onclick="dismissAllAnomalies()">전체 확인 →</button></div>';
  }

    const sorted=[...all].sort();
    box.innerHTML='';
    sorted.forEach(d => {
      const type = (holidayData.holidayTypes||{})[d]||'일반';
      const reason = ((holidayData.holidayReasons||{})[d]||'').replace(/로 인해|으로 인해/g,'').trim();
      var dAttr = escapeJsAttr(d);
      box.innerHTML+=`
        <div class="holiday-row">
          <div style="display:flex;align-items:center;gap:9px;">
            <span class="holiday-date">${escapeHtml(safeFormatDate(d))}</span>
            <span class="holiday-type-tag ${type==='선택'?'ht-optional':'ht-general'}">${escapeHtml(type)}</span>
            ${reason?`<span class="holiday-reason">${escapeHtml(reason)}</span>`:''}
          </div>
          <button class="holiday-del" onclick="doRemoveHoliday('${dAttr}',this)">삭제</button>
        </div>`;
    });
  }
  function doAddHoliday() {
    const dateVal=document.getElementById('newHolidayDate').value;
    const reason=document.getElementById('newHolidayReason').value.trim();
    if(!dateVal){showCustomAlert('날짜를 선택해 주세요.');return;}
    const type = selectedHolidayType;
    // 즉각 피드백: 로컬 데이터에 먼저 추가
    if(!holidayData.holidays) holidayData.holidays=[];
    if(!holidayData.holidays.includes(dateVal)){
      holidayData.holidays.push(dateVal);
      if(!holidayData.holidayTypes) holidayData.holidayTypes={};
      holidayData.holidayTypes[dateVal]=type;
      if(!holidayData.holidayReasons) holidayData.holidayReasons={};
      holidayData.holidayReasons[dateVal]=reason;
      renderHolidayList();
      document.getElementById('headerSub').innerText=(holidayData.holidays.length)+'개 등록됨';
    }
    document.getElementById('newHolidayDate').value='';
    document.getElementById('newHolidayReason').value='';
    setHolidayType('일반');
    google.script.run
      .withSuccessHandler(function(res){
        if(res){
          showToast('휴강이 추가되었습니다');
          cache.dashboard=false;
          // 백그라운드 재동기화
          google.script.run.withSuccessHandler(function(fresh){
            if(fresh){ holidayData=fresh; renderHolidayList();
              document.getElementById('headerSub').innerText=(fresh.holidays||[]).length+'개 등록됨'; }
          }).getInitialData();
        } else {
          // 롤백
          holidayData.holidays=(holidayData.holidays||[]).filter(d=>d!==dateVal);
          delete (holidayData.holidayTypes||{})[dateVal];
          delete (holidayData.holidayReasons||{})[dateVal];
          renderHolidayList();
          document.getElementById('headerSub').innerText=(holidayData.holidays||[]).length+'개 등록됨';
          showCustomAlert('추가 중 오류가 발생했습니다.');
        }
      })
      .withFailureHandler(function(){
        holidayData.holidays=(holidayData.holidays||[]).filter(d=>d!==dateVal);
        renderHolidayList();
        showCustomAlert('서버 오류가 발생했습니다.');
      })
      .addHoliday(dateVal, reason, type);
  }

  function doRemoveHoliday(dateStr, btnElem) {
    showCustomConfirm(safeFormatDate(dateStr)+' 휴강을<br>삭제하시겠습니까?', function(agreed){
      if(!agreed)return;
      // 즉각 피드백: 확인 즉시 목록에서 제거
      const snapHolidays=[...(holidayData.holidays||[])];
      const snapTypes={...(holidayData.holidayTypes||{})};
      const snapReasons={...(holidayData.holidayReasons||{})};
      holidayData.holidays=(holidayData.holidays||[]).filter(d=>d!==dateStr);
      renderHolidayList();
      document.getElementById('headerSub').innerText=(holidayData.holidays||[]).length+'개 등록됨';
      google.script.run
        .withSuccessHandler(function(res){
          if(res){ cache.dashboard=false; showToast('휴강이 삭제되었습니다'); }
          else {
            holidayData.holidays=snapHolidays; holidayData.holidayTypes=snapTypes; holidayData.holidayReasons=snapReasons;
            renderHolidayList();
            document.getElementById('headerSub').innerText=snapHolidays.length+'개 등록됨';
            showCustomAlert('삭제 중 오류가 발생했습니다.');
          }
        })
        .withFailureHandler(function(){
          holidayData.holidays=snapHolidays; holidayData.holidayTypes=snapTypes; holidayData.holidayReasons=snapReasons;
          renderHolidayList();
          showCustomAlert('서버 오류가 발생했습니다.');
        })

  // ─── MEMBER DETAIL ────────────────────────
  function openMemberDetail(name, phone) {
    const m = membersData.find(x => x.name===name && x.phone===phone);
    if (!m) return;

    document.getElementById('editMemberName').value  = m.name;
    document.getElementById('editMemberPhone').value = m.phone;
    document.getElementById('editModalName').innerText  = m.name;
    document.getElementById('editModalPhone').innerText = formatPhone(m.phone);
    document.getElementById('editMemo').value = m.memo || '';

    const phoneOnly = m.phone.replace(/[^0-9]/g,'');
    document.getElementById('contactBtnsBox').innerHTML =
      `<a href="tel:${encodeURIComponent(phoneOnly)}" class="contact-btn">전화하기</a>`+
      `<a href="sms:${encodeURIComponent(phoneOnly)}" class="contact-btn">문자하기</a>`;

    emergencyMode = false;
    document.getElementById('emergencyPanel').style.display = 'none';
    document.getElementById('editToggleBtn').textContent = '⚙ 데이터 수동 수정';

    let allDates=[], dupDates=[];
    m.passes.forEach(p => p.upcomingDates.forEach(d => {
      let sd=safeShortDate(d);
      if(allDates.includes(sd)&&!dupDates.includes(sd)) dupDates.push(sd);
      else allDates.push(sd);
    }));

    const today = new Date(); today.setHours(0,0,0,0);
    let passHtml = '';

    m.passes.forEach(p => {
      const isExpired = p.status==='만료';
      const isUsed    = p.pauseHistory.length >= p.maxPauses;
      const holdingHistory = p.holdingHistory || [];
      var pkAttr = escapeJsAttr(p.passKey), pkSafe = escapeHtml(p.passKey);

      // type chip
      let chipCls='chip-normal', chipLabel=p.type;
      if(p.type==='특정'){chipCls='chip-vip';chipLabel='VIP';}
      else if(p.totalWeeks===1){chipCls='chip-oneday';chipLabel='원데이 '+Math.max(1,p.amount/35000)+'인';}

      let pastRows='', futureRows='', pastCount=0;

      p.upcomingDates.forEach((dateStr,idx)=>{
        const shortD = safeShortDate(dateStr);
        const isPast = new Date(safeFormatDate(dateStr).split('/').join('-')) < today;
        var dateAttr = escapeJsAttr(dateStr);
        const dupW = dupDates.includes(shortD)?`<span class="dup-badge">중복</span>`:'';
        let conflW='';
        m.passes.forEach(op=>{ if(op.passKey!==p.passKey&&op.upcomingDates.includes(dateStr)) conflW=`<span class="conflict-badge">충돌</span>`; });

        if(isPast){
          pastCount++;
          pastRows+=`<div class="date-row"><span class="date-label past">${idx+1}회: ${escapeHtml(shortD)}</span></div>`;
        } else {
          // 2-way segment (쉬어/홀딩)
          const canPause = !isUsed && p.totalWeeks!==1;
          const isHeldDate = holdingHistory.includes(dateStr);
          const seg2Html = (p.totalWeeks===1) ? '' : `
            <div class="seg3">
              <button class="seg3-btn${isHeldDate?'':''}" id="seg_pau_${pkSafe}_${idx}"
                onclick="setDateSeg('${pkAttr}','${dateAttr}','pause',${idx})"
                ${canPause?'':'disabled style="opacity:.35;"'}>쉬어</button>
              <button class="seg3-btn${isHeldDate?' active-hold':''}" id="seg_hld_${pkSafe}_${idx}"
                onclick="setDateSeg('${pkAttr}','${dateAttr}','hold',${idx})">홀딩</button>
            </div>`;
          futureRows+=`
            <div class="date-row" id="drow_${pkSafe}_${idx}">
              <span class="date-label${isHeldDate?' dim':''}" id="dlbl_${pkSafe}_${idx}">${idx+1}회 · ${escapeHtml(shortD)} ${dupW}${conflW}</span>
              ${seg2Html}
            </div>`;
        }
      });

      // paused rows as info
      p.pauseHistory.forEach(dateStr=>{
        var dateAttr=escapeJsAttr(dateStr);
        futureRows+=`
          <div class="date-row">
            <span class="date-label dim">${escapeHtml(safeShortDate(dateStr))} (쉬어가기)</span>
            <button style="font-size:11.5px;font-weight:600;color:var(--red);background:var(--red-bg);border:none;padding:4px 10px;border-radius:8px;" onclick="toggleSpecificPause(this,'${pkAttr}','${dateAttr}',false)">취소</button>
          </div>`;
      });
      holdingHistory.forEach(dateStr=>{
        var dateAttr=escapeJsAttr(dateStr);
        futureRows+=`
          <div class="date-row">
            <span class="date-label dim">${escapeHtml(safeShortDate(dateStr))} (홀딩)</span>
            <button style="font-size:11.5px;font-weight:600;color:var(--green);background:var(--green-bg);border:none;padding:4px 10px;border-radius:8px;" onclick="toggleSpecificHolding(this,'${pkAttr}','${dateAttr}',false)">해제</button>
          </div>`;
      });

      const bodyDisplay = isExpired?'none':'block';
      passHtml+=`
        <div class="pass-card" id="pass_card_${pkSafe}">
          <div class="pass-card-hd" onclick="togglePassCard('${pkAttr}')">
            <div>
              <div style="display:flex;align-items:center;gap:7px;">
                <span class="pass-status">${escapeHtml(p.status)}</span>
                <span class="chip ${chipCls}">${escapeHtml(chipLabel)}</span>
              </div>
              <div class="pass-period">${escapeHtml(safeFormatDate(p.startDate))} ~ ${escapeHtml(safeFormatDate(p.finalExp))}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:12px;">
              <span class="pass-amount">${p.amount.toLocaleString()}원</span>
              <span class="pass-chevron" id="pass_icon_${pkSafe}">${isExpired?'▸':'▾'}</span>
            </div>
          </div>
          <div id="pass_body_${pkSafe}" style="display:${bodyDisplay};" class="pass-body">
            <div class="pass-tags">
              <span class="pass-tag">쉬어가기 ${p.pauseHistory.length}/${p.maxPauses}</span>
              ${holdingHistory.length>0?`<span class="pass-tag green">홀딩 ${holdingHistory.length}회</span>`:''}
              ${p.upcomingDates.filter(d=>new Date(safeFormatDate(d).split('/').join('-'))<today).length>0
                ?`<span class="pass-tag">지난 수업 ${p.upcomingDates.filter(d=>new Date(safeFormatDate(d).split('/').join('-'))<today).length}회</span>`:''}
            </div>
            ${pastCount>0?`
            <div class="past-section">
              <button class="past-toggle-btn" id="past_btn_${pkSafe}" onclick="togglePastDates('${pkAttr}')">지난 수업 ${pastCount}회 ▸</button>
              <div id="past_dates_${pkSafe}" style="display:none;">${pastRows}</div>
            </div>`:'' }
            ${futureRows?`<div class="date-list">${futureRows}</div>`:(!isExpired?'<div style="font-size:13px;color:var(--text-5);padding:8px 0;">남은 수업이 없습니다.</div>':'')}
            ${(p.totalWeeks>1&&((p.status==='만료'&&p.expiredDays<=14)||(p.status==='수강중'&&p.remainingWeeks===1)))?`
              <div class="renewal-row${m.renewalPending?' active':''}" id="renewal_row_${pkSafe}">
                <span class="renewal-label">전날 등록 안내</span>
                <div class="toggle-wrap" style="background:${m.renewalPending?'var(--green)':'#E2DFD8'};" onclick="handleRenewalToggle(this,'${escapeJsAttr(m.name)}','${escapeJsAttr(m.phone)}','${pkSafe}',${!!m.renewalPending})">
                  <div class="toggle-knob" style="transform:${m.renewalPending?'translateX(18px)':'translateX(0)'};"></div>
                </div>
              </div>`:''}
          </div>
        </div>`;
    });

    document.getElementById('crmPassesBox').innerHTML = passHtml;
    buildEmergencyPanel(m);
    document.getElementById('sheetBg').classList.add('show');
    document.getElementById('editModalSheet').classList.add('show');
  }

  // 2-way seg handler (쉬어 / 홀딩 독립 토글) — optimistic UI
  function setDateSeg(passKey, dateStr, seg, rowIdx) {
    const pkSafe = escapeHtml(passKey);
    const name  = document.getElementById('editMemberName').value;
    const phone = document.getElementById('editMemberPhone').value;
    const pauBtn = document.getElementById('seg_pau_'+pkSafe+'_'+rowIdx);
    const hldBtn = document.getElementById('seg_hld_'+pkSafe+'_'+rowIdx);
    const drowEl = document.getElementById('drow_'+pkSafe+'_'+rowIdx);
    const lblEl  = document.getElementById('dlbl_'+pkSafe+'_'+rowIdx);

    if(seg === 'pause') {
      // 즉각 피드백: 행 전체 흐리게 + 버튼 비활성
      if(drowEl) { drowEl.style.opacity='0.35'; drowEl.style.pointerEvents='none'; }
      google.script.run
        .withSuccessHandler(function(res){
          if(res && res.success){
            if(res.hasConflict && res.conflictDates && res.conflictDates.length>0)
              showCustomAlert('⚠️ 날짜 충돌\n밀려난 날짜: '+res.conflictDates.join(', '));
            refreshDetail(name, phone);
          } else {
            if(drowEl) { drowEl.style.opacity=''; drowEl.style.pointerEvents=''; }
            showCustomAlert('처리 중 오류가 발생했습니다.');
          }
        })
        .withFailureHandler(function(){
          if(drowEl) { drowEl.style.opacity=''; drowEl.style.pointerEvents=''; }
          showCustomAlert('서버 오류가 발생했습니다.');
        })
        .togglePauseAdmin(passKey, dateStr, true);

    } else if(seg === 'hold') {
      const wasH = hldBtn && hldBtn.classList.contains('active-hold');
      // 즉각 피드백: 버튼 상태 토글
      if(hldBtn) {
        hldBtn.disabled = true;
        if(!wasH) { hldBtn.classList.add('active-hold'); if(lblEl) lblEl.classList.add('dim'); }
        else       { hldBtn.classList.remove('active-hold'); if(lblEl) lblEl.classList.remove('dim'); }
      }
      google.script.run
        .withSuccessHandler(function(res){
          if(res && res.success) {
            refreshDetail(name, phone);
          } else {
            // 롤백
            if(hldBtn) {
              hldBtn.disabled = false;
              if(!wasH) { hldBtn.classList.remove('active-hold'); if(lblEl) lblEl.classList.remove('dim'); }
              else       { hldBtn.classList.add('active-hold');    if(lblEl) lblEl.classList.add('dim'); }
            }
            showCustomAlert('처리 중 오류가 발생했습니다.');
          }
        })
        .withFailureHandler(function(){
          if(hldBtn) {
            hldBtn.disabled = false;
            if(!wasH) { hldBtn.classList.remove('active-hold'); if(lblEl) lblEl.classList.remove('dim'); }
            else       { hldBtn.classList.add('active-hold');    if(lblEl) lblEl.classList.add('dim'); }
          }
          showCustomAlert('서버 오류가 발생했습니다.');
        })
        .toggleHoldingAdmin(passKey, dateStr, !wasH);
    }
  }

  // ─── EMERGENCY EDIT ───────────────────────
  function buildEmergencyPanel(m) {
    const container = document.getElementById('emergencyPassList');
    container.innerHTML = '';
    m.passes.forEach((p,pIdx)=>{
      const dId='em_dates_'+p.passKey, pId='em_pauses_'+p.passKey, hId='em_holding_'+p.passKey;
      var pk=escapeHtml(p.passKey), pkA=escapeJsAttr(p.passKey), nA=escapeJsAttr(m.name), phA=escapeJsAttr(m.phone);
      var dS=escapeHtml(dId),pS=escapeHtml(pId),hS=escapeHtml(hId);
      var dA=escapeJsAttr(dId),pA=escapeJsAttr(pId),hA=escapeJsAttr(hId);
      container.innerHTML+=`
        <div style="border-top:1px dashed #ECD9A8;padding-top:12px;margin-top:12px;">
          <div style="font-size:12px;font-weight:700;color:var(--gold);margin-bottom:8px;">수강권 ${pIdx+1} — ${pk}</div>
          <div class="em-field"><label class="em-label">구분 (정규/연장/특정/원데이/특별/신규)</label><input type="text" id="em_type_${pk}" class="em-input" value="${escapeHtml(p.type)}"></div>
          <div class="em-field"><label class="em-label">결제금액 (숫자만)</label><input type="number" id="em_amount_${pk}" class="em-input" value="${Number(p.amount)||0}"></div>
          <div class="em-field">
            <label class="em-label">수강 일정 (토요일 선택)</label>
            <div class="sat-picker" id="sp_${dS}"><div class="sat-chips" id="schips_${dS}"></div>
              <div class="sat-cal-nav"><button onclick="satCalMove('${dA}',-1)">◀ 이전</button><span id="scmon_${dS}"></span><button onclick="satCalMove('${dA}',1)">다음 ▶</button></div>
              <div class="sat-cal-grid" id="scgrid_${dS}"></div></div>
            <input type="hidden" id="${dS}" value="${escapeHtml(p.upcomingDates.join(', '))}">
          </div>
          <div class="em-field">
            <label class="em-label">쉬어가기 날짜 (토요일 선택)</label>
            <div class="sat-picker" id="sp_${pS}"><div class="sat-chips" id="schips_${pS}"></div>
              <div class="sat-cal-nav"><button onclick="satCalMove('${pA}',-1)">◀ 이전</button><span id="scmon_${pS}"></span><button onclick="satCalMove('${pA}',1)">다음 ▶</button></div>
              <div class="sat-cal-grid" id="scgrid_${pS}"></div></div>
            <input type="hidden" id="${pS}" value="${escapeHtml(p.pauseHistory.join(', '))}">
          </div>
          <div class="em-field">
            <label class="em-label">홀딩 날짜 (토요일 선택)</label>
            <div class="sat-picker green" id="sp_${hS}"><div class="sat-chips" id="schips_${hS}"></div>
              <div class="sat-cal-nav"><button onclick="satCalMove('${hA}',-1)">◀ 이전</button><span id="scmon_${hS}"></span><button onclick="satCalMove('${hA}',1)">다음 ▶</button></div>
              <div class="sat-cal-grid" id="scgrid_${hS}"></div></div>
            <input type="hidden" id="${hS}" value="${escapeHtml((p.holdingHistory||[]).join(', '))}">
          </div>
          <button class="em-save-btn" onclick="saveEmergencyEdit('${pkA}','${nA}','${phA}')">이 수강권 저장</button>
        </div>`;
    });
    m.passes.forEach(p=>{
      initSatPicker('em_dates_'+p.passKey, p.upcomingDates.join(', '));
      initSatPicker('em_pauses_'+p.passKey, p.pauseHistory.join(', '));
      initSatPicker('em_holding_'+p.passKey, (p.holdingHistory||[]).join(', '));
    });
  }

  // ─── SAT PICKER ───────────────────────────
  function initSatPicker(fieldId, datesStr) {
    const dates=datesStr.split(',').map(d=>d.trim()).filter(Boolean);
    let ref=dates.length>0?new Date(dates[0]):new Date();
    if(isNaN(ref.getTime()))ref=new Date();
    satPickerState[fieldId]={year:ref.getFullYear(),month:ref.getMonth(),dates};
    renderSatPicker(fieldId);
  }
  function renderSatPicker(fieldId) {
    const s=satPickerState[fieldId]; if(!s)return;
    const {year,month,dates}=s;
    const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    document.getElementById('scmon_'+fieldId).innerText=year+'년 '+MONTHS[month];
    const chips=document.getElementById('schips_'+fieldId);
    var fA=escapeJsAttr(fieldId);
    chips.innerHTML=dates.length===0?'<span style="font-size:12px;color:#BBB;font-style:italic;">선택된 날짜 없음</span>':
      dates.map(d=>`<span class="sat-chip">${escapeHtml(d.replace(/-/g,'/'))}<span class="sat-chip-del" onclick="satRemoveDate('${fA}','${escapeJsAttr(d)}')">×</span></span>`).join('');
    const grid=document.getElementById('scgrid_'+fieldId); grid.innerHTML='';
    let day=new Date(year,month,1);
    day.setDate(day.getDate()+((6-day.getDay()+7)%7));
    while(day.getMonth()===month){
      const ds=day.getFullYear()+'-'+String(day.getMonth()+1).padStart(2,'0')+'-'+String(day.getDate()).padStart(2,'0');
      grid.innerHTML+=`<button class="sat-btn${dates.includes(ds)?' selected':''}" onclick="satToggleDate('${fA}','${ds}')">${String(day.getDate()).padStart(2,'0')}일</button>`;
      day.setDate(day.getDate()+7);
    }
    document.getElementById(fieldId).value=dates.join(', ');
  }
  function satCalMove(fieldId,dir){ const s=satPickerState[fieldId];if(!s)return;s.month+=dir;if(s.month>11){s.month=0;s.year++;}if(s.month<0){s.month=11;s.year--;}renderSatPicker(fieldId); }
  function satToggleDate(fieldId,ds){ const s=satPickerState[fieldId];if(!s)return;const i=s.dates.indexOf(ds);if(i===-1)s.dates.push(ds);else s.dates.splice(i,1);s.dates.sort();renderSatPicker(fieldId); }
  function satRemoveDate(fieldId,ds){ const s=satPickerState[fieldId];if(!s)return;s.dates=s.dates.filter(d=>d!==ds);renderSatPicker(fieldId); }

  function saveEmergencyEdit(passKey, name, phone) {
    const typeVal   =document.getElementById('em_type_'+passKey).value.trim();
    const amountVal =Number(document.getElementById('em_amount_'+passKey).value);
    const datesVal  =document.getElementById('em_dates_'+passKey).value;
    const pausesVal =document.getElementById('em_pauses_'+passKey).value;
    const holdingVal=document.getElementById('em_holding_'+passKey).value;
    const rx=/^\d{4}-\d{2}-\d{2}$/;
    const dArr=datesVal.split(',').map(d=>d.trim()).filter(Boolean);
    const pArr=pausesVal.split(',').map(d=>d.trim()).filter(Boolean);
    const hArr=holdingVal.split(',').map(d=>d.trim()).filter(Boolean);
    const validTypes=['정규','연장','특정','원데이','신규','특별'];
    if(!validTypes.includes(typeVal)){showCustomAlert('구분 값을 확인해 주세요.\n(정규/연장/특정/특별/원데이/신규)');return;}
    if(isNaN(amountVal)||amountVal<0){showCustomAlert('금액을 올바르게 입력해 주세요.');return;}
    const bad=[...dArr,...pArr,...hArr].find(d=>d&&!rx.test(d));
    if(bad){showCustomAlert(`날짜 형식 오류: "${bad}"\nYYYY-MM-DD 형식으로 입력해 주세요.`);return;}
    showCustomConfirm(`[${name}] 수강권을 저장할까요?<br>저장 후 되돌릴 수 없습니다.`, function(agreed){
      if(!agreed)return;
      showTopLoading();
      google.script.run
        .withSuccessHandler(function(res){
          hideTopLoading();
          if(res){
            showToast('저장되었습니다');
            cache.members=false;
            google.script.run
              .withSuccessHandler(function(memberData){
                if(memberData){const i=membersData.findIndex(x=>x.name===memberData.name&&x.phone===memberData.phone);if(i!==-1)membersData[i]=memberData;else membersData.push(memberData);cache.members=true;}
                checkAnomalies();renderMembers();openMemberDetail(name,phone);
              })
              .getAdminMemberDetail(name,phone);
          } else{showCustomAlert('저장 중 오류가 발생했습니다.');}
        })
        .emergencyEditPass(passKey,typeVal,amountVal,dArr.join(', '),pArr.join(', '),hArr.join(', '));
    });
  }
</script>
